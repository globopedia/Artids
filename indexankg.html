  <script>
let rankingActual = [];
let ordenActual = { campo: "globopedia", asc: true };
let filtroTorneo = "TODOS";

function clasificarTorneo(torneo) {
  if (!torneo) return "OTRO";

  const t = torneo.toLowerCase();

  if (t.includes("libertadores")) return "LIBERTADORES";
  if (t.includes("sudamericana")) return "SUDAMERICANA";
  if (t.includes("copa argentina")) return "COPA ARGENTINA";
  if (t.includes("superliga")) return "COPA SUPERLIGA";
  if (t.includes("maradona")) return "COPA MARADONA";
  if (t.includes("supercopa")) return "SUPERCOPA";
  if (t.includes("amistoso")) return "AMISTOSO";

  if (
    t.includes("nacional b") ||
    t.includes("b nacional") ||
    t.includes("bn") ||
    t.includes("nb") ||
    t.includes("reducido")
  ) return "B NACIONAL";

  if (t.includes("campeonato")) return "CAMPEONATO";

  return "OTRO";
}
function aplicarFiltros() {
  let partidos = [...datosArtids2015, ...datosArtids2000];

  // 📅 FILTRO FECHA
  const desde = document.getElementById("fechaDesde").value;
  const hasta = document.getElementById("fechaHasta").value;

  if (desde) {
    partidos = partidos.filter(p => new Date(p.Fecha) >= new Date(desde));
  }
  if (hasta) {
    partidos = partidos.filter(p => new Date(p.Fecha) <= new Date(hasta));
  }

  // 🏆 FILTRO TORNEO
  if (filtroTorneo !== "TODOS") {
    partidos = partidos.filter(p =>
      clasificarTorneo(p.Torneo) === filtroTorneo
    );
  }

  // 📊 GENERAR RANKING
  let ranking = generarRanking(partidos);

  // 🧍 FILTRO POSICIONES
  const posicionesActivas = Array.from(
    document.querySelectorAll('#filtroPosiciones input:checked')
  ).map(c => c.value);

  ranking = ranking.filter(j =>
    posicionesActivas.includes(j.posicion)
  );
// 🌍 FILTRO EXTRANJEROS
const soloExtranjeros = document.getElementById("soloExtranjeros").checked;
if (soloExtranjeros) {
  ranking = ranking.filter(j => esExtranjero(j.nombre));
}

// 🏠 FILTRO INFERIORES
const soloInferiores = document.getElementById("soloInferiores").checked;
if (soloInferiores) {
  ranking = ranking.filter(j => esDeInferiores(j.nombre));
}
  // 📈 ORDEN
  ranking.sort((a, b) =>
    b[ordenActual.campo] - a[ordenActual.campo]
  );

  rankingActual = ranking;

 renderRanking(rankingActual);
cambiarColumnas(); // 🔥 MUY IMPORTANTE
}

/* =========================
   FUNCIONES BASE
========================= */

    function norm(t) {
  return (t || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}
function formatearApellidoPrimero(nombreCompleto) {

  const partes = nombreCompleto.trim().split(/\s+/);

  if (partes.length === 2) {
    return `${partes[1]}, ${partes[0]}`;
  }

  if (partes.length === 3) {

    if (partes[1].length === 1) {
      return `${partes[2]}, ${partes[0]} ${partes[1]}`;
    }

    return `${partes[1]} ${partes[2]}, ${partes[0]}`;
  }

  const nombre = partes[0];
  const apellido = partes.slice(1).join(" ");
  return `${apellido}, ${nombre}`;
}
/* =========================
   OBTENER FUTBOLISTAS
========================= */

function obtenerFutbolistasUnicos(encuentros) {
  const set = new Set();

  encuentros.forEach(p => {
    const jugadores = (p.Huracán || "")
      .replace(/[()]/g, ",")
      .replace(/\b\d+(?:\+\d+)?\s*/g, "")
      .replace(/\.+/g, "")
      .replace(/\s+y\s+/gi, ",")
      .replace(/\s+e\s+/gi, ",")
      .replace(/,,+/g, ",")
      .replace(/\s+,/g, ",")
      .replace(/,\s+/g, ",")
      .split(/[,;]+/)
      .map(j => j.trim())
      .filter(j => j.length > 1);

    jugadores.forEach(j => set.add(j));
  });

  return Array.from(set);
}

/* =========================
   CALCULAR RENDIMIENTO
========================= */

function calcularRendimientoFutbolista(nombre, encuentros) {

  const partidos = encuentros.filter(p => {
    const jugadores = (p.Huracán || "")
      .replace(/[()]/g, ",")
      .replace(/\b\d+(?:\+\d+)?\s*/g, "")
      .replace(/\.+/g, "")
      .replace(/\s+y\s+/gi, ",")
      .replace(/\s+e\s+/gi, ",")
      .replace(/,,+/g, ",")
      .replace(/\s+,/g, ",")
      .replace(/,\s+/g, ",")
      .split(/[,;]+/)
      .map(j => j.trim())
      .filter(j => j.length > 1);

    return jugadores.some(j => norm(j) === norm(nombre));
  });

  if (!partidos.length) return null;
let puntosGlobopedia = 0;

partidos.forEach(p => {
  // por ahora asumimos 90 minutos
  puntosGlobopedia += calcularPuntosPartido(p, 90);
});

  const total = partidos.length;
  const ganados = partidos.filter(p => norm(p.Situación) === "victoria").length;
  const empatados = partidos.filter(p => norm(p.Situación) === "empate").length;

  const efectividad = ((ganados * 3 + empatados) * 100 / (total * 3));

return {
  nombre,
  partidos: total,
  efectividad: Number(efectividad.toFixed(1)),
  globopedia: Number(puntosGlobopedia.toFixed(1))
};
}

function obtenerMinutoIngreso(texto, nombre) {

  const nombreNorm = nombre.toLowerCase();

  const regex = /\((\d+(?:\+\d+)?)\s+([^)]+)\)/g;

  let match;

  while ((match = regex.exec(texto)) !== null) {

    let minuto = match[1];
    let bloque = match[2].toLowerCase();

    // separar posibles múltiples jugadores
    const jugadores = bloque.split(/y|,/).map(j => j.trim());

    if (jugadores.includes(nombreNorm)) {

      if (minuto.includes("+")) {
        return minuto.split("+").map(Number).reduce((a,b)=>a+b);
      }

      return Number(minuto);
    }
  }

  return null;
}

function obtenerMinutoSalida(texto, futbolista) {
  const regex = new RegExp(
    `${futbolista}\\s*\\(\\s*(\\d+(?:\\+\\d+)?)\\s+[^()]+`,
    "i"
  );

  const match = texto.match(regex);
  if (!match) return null;

  const m = match[1];
  return m.includes("+")
    ? m.split("+").map(Number).reduce((a,b)=>a+b)
    : Number(m);
}
function obtenerMinutoSalidaForzada(incidencias, nombre) {

  if (!incidencias) return null;

  const regex = new RegExp(
    `(\\d+(?:\\+\\d+)?)\\s+(EXP|LES)\\s+${nombre}`,
    "i"
  );

  const match = incidencias.match(regex);

  if (!match) return null;

  const m = match[1];

  return m.includes("+")
    ? m.split("+").map(Number).reduce((a,b)=>a+b)
    : Number(m);
}
    function calcularGlobopediaFutbolista(nombre, encuentros) {

  const delFutbolista = encuentros.filter(p => {
    const jugadores = (p.Huracán || "")
      .replace(/[()]/g, ",")
      .replace(/\b\d+(?:\+\d+)?\s*/g, "")
      .replace(/\.+/g, "")
      .replace(/\s+y\s+/gi, ",")
      .replace(/\s+e\s+/gi, ",")
      .replace(/,,+/g, ",")
      .replace(/\s+,/g, ",")
      .replace(/,\s+/g, ",")
      .replace(/\s+/g, " ")
      .split(/[,;]+/)
      .map(j => j.trim())
      .filter(j => j.length > 1);

    return jugadores.some(j => norm(j) === norm(nombre));
  });

  let totalPuntos = 0;

  delFutbolista.forEach(p => {

    let finReal = Number(p.Fin2T) || 90;
    if (finReal > 90) finReal = 90;

    const ingreso = obtenerMinutoIngreso(p.Huracán || "", nombre);
    const salida  = obtenerMinutoSalida(p.Huracán || "", nombre);

    let minutosJugados = 0;

    if (ingreso !== null) {
      minutosJugados = Math.max(0, finReal - ingreso + 1);
    } else if (salida !== null) {
      minutosJugados = Math.max(0, salida - 1);
    } else {
      minutosJugados = finReal;
    }

    const texto = p.Huracán || "";
    const expulsado = new RegExp(`${nombre}\\s*\\(\\s*\\d+(?:\\+\\d+)?\\s+Exp`, "i").test(texto);
    if (expulsado && salida !== null) {
      minutosJugados = Math.max(0, salida - 1);
    }

    const puntosPartido = calcularPuntosPartido(p, minutosJugados);

    totalPuntos += puntosPartido;

  });

  return Number(totalPuntos.toFixed(1));
}
function calcularGolesFutbolista(nombre, encuentros) {

  let totalGoles = 0;

  encuentros.forEach(p => {

    const incidencias = p.Incidencias || "";
    if (!incidencias) return;

    const regex = new RegExp(`GOL\\s+${nombre}\\s*\\(HUR\\)`, "gi");

    const matches = incidencias.match(regex);

    if (matches) {
      totalGoles += matches.length;
    }

  });

  return totalGoles;
}
function calcularExpulsionesFutbolista(nombre, partidos) {

  const nombreNormalizado = norm(nombre);
  let expulsiones = 0;

  partidos.forEach(p => {

    if (!p.Incidencias) return;

    const incidencias = p.Incidencias.split(" - ");

    incidencias.forEach(item => {

      const texto = norm(item);

      if (
        texto.includes("exp") &&
        texto.includes(nombreNormalizado) &&
        texto.includes("(hur)")
      ) {
        expulsiones++;
      }

    });

  });

  return expulsiones;
}

function calcularVallasInvictasFutbolista(nombre, partidos) {

  const nombreNormalizado = norm(nombre);
  let vallas = 0;

  partidos.forEach(p => {

    // Verificamos que el jugador haya jugado el partido
    if (!p.Huracán) return;

    const jugo = norm(p.Huracán).includes(nombreNormalizado);
    if (!jugo) return;

    // Ahora verificamos que el rival haya hecho 0 goles
    const Resultado1 = parseInt(p.Resultado1);
    const Resultado2 = parseInt(p.Resultado2);

    if (isNaN(Resultado2)) return;

    if (Resultado2 === 0) {
      vallas++;
    }

  });

  return vallas;
}
function obtenerMinutosGolesRival(incidencias) {

  if (!incidencias) return [];

  const limpio = incidencias
    .replace(/<[^>]+>/g, " ")   // 🔥 elimina TODO HTML (<br>, <b>, etc)
    .toUpperCase();

  const regex = /(\d+(?:\+\d+)?)\s+GOL\s+([^()]+)\(([^)]+)\)/g;

  const minutos = [];
  let match;

  while ((match = regex.exec(limpio)) !== null) {

    const minutoTxt = match[1];
    const equipo = match[3]; // lo que está entre paréntesis

    // 🚫 ignorar goles de Huracán
    if (equipo.includes("HUR")) continue;

    const minuto = minutoTxt.includes("+")
      ? minutoTxt.split("+").map(Number).reduce((a,b)=>a+b)
      : Number(minutoTxt);

    minutos.push(minuto);
  }

  return minutos;
}
    function formatearFecha(fecha) {

  if (!fecha) return "";

  const d = String(fecha.getDate()).padStart(2,"0");
  const m = String(fecha.getMonth()+1).padStart(2,"0");
  const y = fecha.getFullYear();

  return `${d}/${m}/${y}`;
}
function calcularRachaSinGoles(nombre, partidos) {

  const partidosJugador = partidos
    .filter(p => (p.Huracán || "").toLowerCase().includes(nombre.toLowerCase()))
    .sort((a,b) => convertirFecha(a.Fecha) - convertirFecha(b.Fecha));

  let mejorRacha = 0;
  let rachaActual = 0;
  let inicioRacha = null;
  let mejorInicio = null;
  let mejorFin = null;
  let ultimaFecha = null;
  
  for (const p of partidosJugador) {

    const fechaPartido = convertirFecha(p.Fecha);
    ultimaFecha = fechaPartido;
    const incidencias = p.Incidencias || "";

    // ⏱ minutos que jugó
    const minutos = calcularMinutosJugador(p, nombre);

    // ⏱ límites dentro del partido
let ingreso = obtenerMinutoIngreso(p.Huracán || "", nombre);
let salida = obtenerMinutoSalida(p.Huracán || "", nombre);
let salidaForzada = obtenerMinutoSalidaForzada(p.Incidencias || "", nombre);

// 🔥 salida real
let salidaReal = null;

if (salida !== null && salidaForzada !== null) {
  salidaReal = Math.min(salida, salidaForzada);
} else {
  salidaReal = salida !== null ? salida : salidaForzada;
}

// 🔥 fin real del partido (CON descuento)
let finPartido = Math.max(
  Number(p.Fin2T) || 90,
  ...obtenerMinutosGolesRival(p.Incidencias || "")
);

// 🔥 límites del jugador
let inicio = ingreso !== null ? ingreso : 1;
let fin = salidaReal !== null ? salidaReal - 1 : finPartido;
    
    // ⚽ goles del rival
    const goles = obtenerMinutosGolesRival(incidencias)
      .filter(m => m >= inicio && m <= fin)
      .sort((a,b)=>a-b);

    // 🟢 SI NO HAY GOLES → suma todo
    if (goles.length === 0) {

      if (rachaActual === 0) inicioRacha = fechaPartido;

      rachaActual += (fin - inicio + 1);

    } else {

      let cursor = inicio;

      for (const gol of goles) {

        const tramo = gol - cursor;

        if (rachaActual === 0) inicioRacha = fechaPartido;

        rachaActual += tramo;

        if (rachaActual > mejorRacha) {
          mejorRacha = rachaActual;
          mejorInicio = inicioRacha;
          mejorFin = fechaPartido;
        }

        // 🔴 corta la racha en el gol
        rachaActual = 0;
        inicioRacha = null;

        cursor = gol + 1;
      }

      // 🟡 lo que queda después del último gol
 if (cursor <= fin) {

  if (rachaActual === 0) inicioRacha = fechaPartido;

  rachaActual += (fin - cursor + 1);

  // 🔥 evaluar también este tramo
  if (rachaActual > mejorRacha) {
    mejorRacha = rachaActual;
    mejorInicio = inicioRacha;
    mejorFin = fechaPartido;
  }
}
    }

    // 🔄 actualizar mejor racha si terminó sin gol
    if (rachaActual > mejorRacha) {
      mejorRacha = rachaActual;
      mejorInicio = inicioRacha;
      mejorFin = fechaPartido;
    }
  }

// 🔥 cerrar racha abierta al final
if (rachaActual > 0) {
  if (rachaActual > mejorRacha) {
    mejorRacha = rachaActual;
    mejorInicio = inicioRacha;
    mejorFin = ultimaFecha;
  }
}
  return {

function esClasico(rival, fecha) {
  if (!rival || !fecha) return false;

  // fecha viene como "dd/mm/yyyy"
  const partes = fecha.split("/");
  const d = Number(partes[0]);
  const m = Number(partes[1]);
  const y = Number(partes[2]);

  const partidoIndex = y * 12 + m;
  const rivalNorm = rival.toLowerCase();

  return CLASICOS.some(c => {
    const desde = ymToIndex(c.desde);
    const hasta = ymToIndex(c.hasta);

    return (
      rivalNorm.includes(c.club.toLowerCase()) &&
      partidoIndex >= desde &&
      partidoIndex <= hasta
    );
  });
}

function calcularMayorInactividad(fechas) {
  if (!fechas || fechas.length < 2) return 0;

  const fechasValidas = fechas.filter(f => f instanceof Date && !isNaN(f));

  if (fechasValidas.length < 2) return 0;

  fechasValidas.sort((a, b) => a - b);

  let maxDiff = 0;

  for (let i = 1; i < fechasValidas.length; i++) {
    const diff = fechasValidas[i] - fechasValidas[i - 1];
    if (diff > maxDiff) maxDiff = diff;
  }

  return maxDiff;
}

function formatearTiempo(ms) {
  if (!ms || ms <= 0) return "0";

  const dias = Math.floor(ms / (1000 * 60 * 60 * 24));

  const años = Math.floor(dias / 365);
  const meses = Math.floor((dias % 365) / 30);
  const diasRestantes = dias % 30;

  return `${años}a ${meses}m ${diasRestantes}d`;
}

function construirPeriodos(anios){

  if(anios.length===0) return "";

  let periodos = [];
  let inicio = anios[0];
  let anterior = anios[0];

  for(let i=1;i<anios.length;i++){

    if(anios[i] === anterior + 1){
      anterior = anios[i];
    } else {

      periodos.push(
        inicio === anterior
        ? `${inicio}`
        : `${inicio}-${anterior}`
      );

      inicio = anios[i];
      anterior = anios[i];
    }

  }

  periodos.push(
    inicio === anterior
    ? `${inicio}`
    : `${inicio}-${anterior}`
  );

  return periodos.join(", ");

}

function parseMinuto(valor, fallback = 0) {
  if (!valor || valor === "0") return fallback;

  const limpio = String(valor).trim();

  if (limpio.includes("+")) {
    const [base, extra] = limpio.split("+").map(Number);
    return (base || 0) + (extra || 0);
  }

  const n = Number(limpio);
  return isNaN(n) ? fallback : n;
}

function calcularMinutosJugador(p, nombre) {

  const texto = p.Huracán || "";

  let finReal = 0;

  if (p.Fin2E && p.Fin2E !== "0") {
    finReal = parseMinuto(p.Fin2E, 120);
  } else {
    finReal = parseMinuto(p.Fin2T, 90);
  }

  let minutosJugados = finReal;

  let ingreso = obtenerMinutoIngreso(texto, nombre);
  let salida  = obtenerMinutoSalida(texto, nombre);

  // 👉 SUPLENTE
  if (ingreso !== null) {

    let finJugador = finReal;

    if (salida !== null) {
      finJugador = salida - 1;
    }

    minutosJugados = Math.max(0, finJugador - ingreso + 1);

  // 👉 TITULAR reemplazado
  } else if (salida !== null) {

    minutosJugados = Math.max(0, salida - 1);

  // 👉 TITULAR completo
  } else {

    minutosJugados = finReal;
  }

  // 🔴 EXPULSIONES
  const incidencias = p.Incidencias || "";

  const expulsionRegex = new RegExp(
    `(\\d+(?:\\+\\d+)?)\\s+EXP\\s+${nombre}`,
    "i"
  );

  if (expulsionRegex.test(incidencias)) {

    const m = incidencias.match(expulsionRegex)[1];

    let minutoExpulsion = m.includes("+")
      ? m.split("+").map(Number).reduce((a, b) => a + b)
      : Number(m);

    if (ingreso === null) {
      minutosJugados = Math.max(0, minutoExpulsion - 1);
    } else {
      minutosJugados = Math.max(0, minutoExpulsion - ingreso + 1);
    }
  }

  return minutosJugados;
}
